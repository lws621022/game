<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>學生遊戲作品集</title>
<style>
  body { font-family: Arial; text-align: center; background: #f4f6f9; }
  .grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
  .card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 140px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }
  a { text-decoration: none; color: #1565c0; font-weight: bold; }
</style>
</head>
<body>

<h1>學生遊戲作品集</h1>

<h2>4135 班</h2>
<div class="grid" id="class4135"></div>

<h2>4136 班</h2>
<div class="grid" id="class4136"></div>

<script>
// 4135班
for(let i=413501; i<=413534; i++){
  let html = `<div class="card">
    <a href="${i}.html">${i}</a>
  </div>`;
  document.getElementById("class4135").innerHTML += html;
}

// 4136班
for(let i=413601; i<=413634; i++){
  let html = `<div class="card">
    <a href="${i}.html">${i}</a>
  </div>`;
  document.getElementById("class4136").innerHTML += html;
}
</script>

</body>
</html>
